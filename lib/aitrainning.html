<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, interactive-widget=resizes-content">
  <title>MistaHub AI Engine</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root { --bg: #131314; --panel: #1e1f20; --accent: #a8c7fa; --text: #e3e3e3; }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; height: 100dvh; display: flex; flex-direction: column; }
    
    /* Syntax Highlighting Mock */
    .code-block { background: #000; border-radius: 12px; border: 1px solid #333; padding: 16px; margin-top: 10px; font-family: monospace; overflow-x: auto; color: #a8c7fa; }
    .keyword { color: #f472b6; }
    
    /* Tabs */
    .tab-btn.active { border-bottom: 2px solid var(--accent); color: var(--accent); }
  </style>
</head>
<body>

<!-- Header -->
<header class="h-14 flex items-center justify-between px-4 border-b border-[#333]">
  <div class="font-bold tracking-tighter text-lg">MistaHub AI</div>
  <div class="flex gap-2">
    <button onclick="switchView('chat')" class="text-xs font-bold px-3 py-1 bg-[#282a2c] rounded-full">Chat</button>
    <button onclick="switchView('code')" class="text-xs font-bold px-3 py-1 bg-[#282a2c] rounded-full">Workspace</button>
  </div>
</header>

<!-- Main Container -->
<main id="chat-view" class="flex-1 flex flex-col overflow-hidden">
  <div id="chat-box" class="flex-1 overflow-y-auto p-4 space-y-6">
    <div class="flex gap-4">
      <div class="w-8 h-8 rounded-full bg-blue-500/20 flex items-center justify-center text-blue-400">AI</div>
      <div class="text-sm pt-1">Hello! Main aapka Universal SEO Engine hoon. Aaj kya generate karein?</div>
    </div>
  </div>
  
  <div class="p-4 border-t border-[#333]">
    <div class="flex items-center bg-[#1e1f20] rounded-2xl p-2 border border-[#333]">
      <textarea id="chatInput" rows="1" class="flex-1 bg-transparent px-3 outline-none text-sm" placeholder="Ask anything..."></textarea>
      <button onclick="send()" class="bg-white text-black p-2 rounded-full font-bold text-sm">➤</button>
    </div>
  </div>
</main>

<!-- Code Workspace -->
<main id="code-view" class="flex-1 hidden flex-col">
  <div class="flex border-b border-[#333]">
    <button onclick="setTab('meta')" class="tab-btn active px-4 py-3 text-xs font-bold">META TAGS</button>
    <button onclick="setTab('robots')" class="tab-btn px-4 py-3 text-xs font-bold">ROBOTS</button>
    <button onclick="setTab('sitemap')" class="tab-btn px-4 py-3 text-xs font-bold">SITEMAP</button>
  </div>
  <textarea id="editor" class="flex-1 bg-[#000] text-emerald-400 p-6 font-mono text-sm outline-none"></textarea>
</main>

<script>
  let state = { domain: '', title: '', step: 'init' };
  
  function switchView(v) {
    document.getElementById('chat-view').classList.toggle('hidden', v !== 'chat');
    document.getElementById('code-view').classList.toggle('hidden', v !== 'code');
  }

  function setTab(t) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
    // Logic to switch content in editor here
  }

  function addCodeBlock(lang, code) {
    const box = document.getElementById('chat-box');
    const div = document.createElement('div');
    div.className = 'code-block';
    div.innerHTML = `<div class="text-xs mb-2 text-gray-500 font-bold uppercase">${lang}</div><code>${code.replace(/</g, '&lt;')}</code>`;
    box.appendChild(div);
    scrollToBottom();
  }

  function send() {
    const input = document.getElementById('chatInput');
    const txt = input.value;
    if(!txt) return;
    
    // User bubble
    const box = document.getElementById('chat-box');
    box.innerHTML += `<div class="text-right text-sm bg-[#333] p-3 rounded-2xl ml-auto max-w-[80%]">${txt}</div>`;
    input.value = '';
    
    // AI Logic
    setTimeout(() => {
      if(state.step === 'init') {
        state.domain = txt;
        state.step = 'meta';
        box.innerHTML += `<div class="flex gap-3 text-sm">🤖 <div class="pt-1">Acha domain hai! Ab Meta Title bataiye.</div></div>`;
      } else if (state.step === 'meta') {
        state.title = txt;
        const code = `<title>${state.title}</title>\n<meta name="description" content="Generated by MistaHub AI">`;
        addCodeBlock('HTML', code);
        box.innerHTML += `<div class="text-sm">Meta tags ready! Suggeestions: <button class="chip">Add OG Tags</button> <button class="chip">Add Schema</button></div>`;
      }
    }, 500);
  }

  function scrollToBottom() { document.getElementById('chat-box').scrollTop = 10000; }
</script>
</body>
</html>
