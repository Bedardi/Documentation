<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MistaHub Dev Blog</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  
  <!-- Clean and Modern Theme -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/buble.css">
  
  <!-- Custom CSS for Blog Feel -->
  <style>
    /* Content width aur typography ko blog jaisa banana */
    .markdown-section {
      max-width: 800px;
      margin: 0 auto;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.8;
      font-size: 17px;
    }
    .markdown-section h1 {
      font-size: 2.8em;
      font-weight: 800;
      text-align: left;
      margin-bottom: 0.2em;
    }
    .markdown-section h2 {
      border-bottom: none;
      color: #2c3e50;
      margin-top: 2em;
    }
    /* Blog style quotes */
    .markdown-section blockquote {
      border-left: 4px solid #0074d9;
      background: #f8f9fa;
      padding: 15px 20px;
      border-radius: 4px;
      font-style: italic;
    }
    /* Date aur Tags styling */
    .post-meta {
      color: #7f8c8d;
      font-size: 0.9em;
      margin-bottom: 2em;
      border-bottom: 1px solid #eee;
      padding-bottom: 10px;
    }
  </style>
</head>
<body>
  <div id="app">Loading MistaHub Blog...</div>
  
  <script>
    window.$docsify = {
      name: '<b>MistaHub</b>',
      repo: '',
      loadSidebar: true,
      subMaxLevel: 2,
      auto2top: true,
      
      // 1. CLEAN URLS ACTIVATE (Removes # from links)
      routerMode: 'history',
      
      search: {
        placeholder: '🔍 Search posts...',
        noData: 'No Results Found!'
      },
      
      // 2. BLOG PAGINATION (Next/Prev Buttons)
      pagination: {
        previousText: 'Pichla Post',
        nextText: 'Agla Post',
        crossChapter: true,
        crossChapterText: true,
      }
    }
  </script>
  
  <!-- Core Scripts -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script>
  
  <!-- Pagination Plugin Script -->
  <script src="//cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>
  
  <!-- Syntax Highlighting -->
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
</body>
</html>
