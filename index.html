<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>MistaHub Developers</title>
  
  <!-- Tailwind CSS for Modern UI -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Marked.js for fast Markdown to HTML conversion -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  
  <style>
    /* Glassmorphism Classes */
    .glass {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.3);
    }
    .card-glass {
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.05);
      transition: transform 0.2s ease;
    }
    .card-glass:active { transform: scale(0.98); }
    
    /* Markdown Styles */
    .md-content h1 { font-size: 2xl; font-weight: bold; margin-bottom: 1rem; color: #111827; }
    .md-content h2 { font-size: 1.5xl; font-weight: bold; margin-top: 1.5rem; margin-bottom: 0.5rem; }
    .md-content p { color: #4B5563; margin-bottom: 1rem; line-height: 1.6; }
    .md-content pre { background: #1F2937; color: #fff; padding: 1rem; border-radius: 12px; overflow-x: auto; margin-bottom: 1rem; }
    .md-content code { font-family: monospace; }
    
    /* Page Transitions */
    .page-enter { animation: fadeIn 0.3s ease forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased overflow-hidden flex h-screen">

  <!-- Desktop Sidebar (Hidden on Mobile) -->
  <aside class="hidden md:flex w-72 bg-white border-r flex-col h-full shadow-sm z-20">
    <div class="p-6 font-black text-2xl tracking-tighter text-blue-600">MistaHub</div>
    <nav id="desktop-nav" class="flex-1 overflow-y-auto px-4 space-y-2"></nav>
  </aside>

  <!-- Main App View -->
  <main class="flex-1 flex flex-col h-full relative w-full">
    
    <!-- App Header (Glassmorphic) -->
    <header class="glass sticky top-0 z-30 px-4 py-4 flex justify-between items-center md:px-8">
      <div class="flex items-center gap-3">
        <!-- Back Button (SVG) - Hidden by default -->
        <button id="back-btn" class="hidden text-gray-600 hover:text-black p-2 -ml-2" onclick="goHome()">
          <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"></path></svg>
        </button>
        <h1 id="header-title" class="text-xl font-bold tracking-tight">Home</h1>
      </div>
      <button id="share-btn" class="hidden text-blue-600" onclick="shareCurrentPage()">
        <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"></path></svg>
      </button>
    </header>

    <!-- Scrollable Content Area -->
    <div id="content-area" class="flex-1 overflow-y-auto p-4 pb-24 md:p-8 md:pb-8 page-enter">
      <!-- Loading State -->
      <div id="loader" class="hidden text-center text-gray-400 mt-10">Loading content...</div>
      
      <!-- Home Feed (Facebook Post Style Cards) -->
      <div id="home-feed" class="max-w-2xl mx-auto space-y-4"></div>
      
      <!-- Markdown Render Area -->
      <div id="doc-viewer" class="hidden max-w-3xl mx-auto md-content pb-10"></div>
    </div>

    <!-- Mobile Bottom Navigation (SVG) -->
    <nav class="md:hidden glass fixed bottom-0 w-full flex justify-around items-center pb-safe pt-2 px-2 pb-4 z-30">
      <button onclick="goHome()" class="flex flex-col items-center text-blue-600 p-2">
        <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
        <span class="text-[10px] font-medium mt-1">Home</span>
      </button>
      <button class="flex flex-col items-center text-gray-400 hover:text-blue-600 p-2">
        <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
        <span class="text-[10px] font-medium mt-1">Search</span>
      </button>
    </nav>
  </main>

  <script>
    let appData = [];
    let currentPath = '';

    // Initialize App
    async function init() {
      try {
        const res = await fetch('/sitemap.json');
        appData = await res.json();
        renderHomeFeed();
        renderDesktopNav();
        checkUrlHash(); // Load specific doc if link shared
      } catch (e) {
        document.getElementById('home-feed').innerHTML = '<p class="text-red-500">Error loading data.</p>';
      }
    }

    // Render Home Cards
    function renderHomeFeed() {
      const feed = document.getElementById('home-feed');
      feed.innerHTML = appData.map(doc => `
        <div class="card-glass p-5 cursor-pointer" onclick="loadDoc('${doc.id}')">
          <div class="flex items-center gap-3 mb-3">
            <div class="w-10 h-10 rounded-full bg-blue-100 flex items-center justify-center text-blue-600 font-bold">${doc.title.charAt(0)}</div>
            <div>
              <h2 class="font-bold text-gray-900">${doc.title}</h2>
              <p class="text-xs text-gray-500">Documentation File</p>
            </div>
          </div>
          <p class="text-gray-600 text-sm mb-4 line-clamp-2">${doc.desc}</p>
          <div class="border-t pt-3 flex justify-between items-center">
            <span class="text-blue-600 text-sm font-medium">Read Article</span>
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" class="text-gray-400"><path d="M9 5l7 7-7 7"></path></svg>
          </div>
        </div>
      `).join('');
    }

    // Render Desktop Sidebar
    function renderDesktopNav() {
      document.getElementById('desktop-nav').innerHTML = appData.map(doc => `
        <button onclick="loadDoc('${doc.id}')" class="w-full text-left p-3 rounded-xl hover:bg-blue-50 text-gray-700 hover:text-blue-600 font-medium transition-colors">
          ${doc.title}
        </button>
      `).join('');
    }

    // Load Markdown File
    async function loadDoc(id) {
      const docData = appData.find(d => d.id === id);
      if(!docData) return;
      
      currentPath = window.location.origin + '/#/' + id;
      window.history.pushState(null, '', '/#/' + id);

      // UI Transitions
      document.getElementById('home-feed').classList.add('hidden');
      document.getElementById('doc-viewer').classList.add('hidden');
      document.getElementById('loader').classList.remove('hidden');
      document.getElementById('back-btn').classList.remove('hidden');
      document.getElementById('share-btn').classList.remove('hidden');
      document.getElementById('header-title').innerText = docData.title;

      // Fetch and Parse Markdown
      try {
        const res = await fetch(docData.file);
        if(!res.ok) throw new Error();
        const text = await res.text();
        
        document.getElementById('doc-viewer').innerHTML = marked.parse(text);
        document.getElementById('loader').classList.add('hidden');
        document.getElementById('doc-viewer').classList.remove('hidden');
        
        // Scroll to top
        document.getElementById('content-area').scrollTo(0,0);
      } catch (e) {
        document.getElementById('loader').innerText = "File not found or failed to load.";
      }
    }

    // Go Back to Home
    function goHome() {
      window.history.pushState(null, '', '/');
      document.getElementById('home-feed').classList.remove('hidden');
      document.getElementById('doc-viewer').classList.add('hidden');
      document.getElementById('back-btn').classList.add('hidden');
      document.getElementById('share-btn').classList.add('hidden');
      document.getElementById('header-title').innerText = 'Home';
    }

    // Native Share
    function shareCurrentPage() {
      if (navigator.share) {
        navigator.share({ title: 'MistaHub Docs', url: currentPath });
      } else {
        navigator.clipboard.writeText(currentPath);
        alert('Link Copied!');
      }
    }

    // Handle Direct Links
    function checkUrlHash() {
      const hash = window.location.hash.replace('#/', '');
      if (hash) loadDoc(hash);
    }
    window.addEventListener('popstate', checkUrlHash);

    // Boot Up
    init();
  </script>
</body>
</html>
