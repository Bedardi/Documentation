l<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>MistaHub Docs & Blog</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased overflow-x-hidden">

  <header class="fixed top-0 w-full bg-white/90 backdrop-blur-md border-b border-gray-200 z-40 px-4 py-3 shadow-sm">
    <div class="max-w-3xl mx-auto flex flex-col gap-3">
      <div class="flex justify-between items-center">
        <div class="flex items-center gap-3">
          <button onclick="toggleDrawer()" class="p-2 -ml-2 text-gray-600 hover:text-blue-600 transition-colors">
            <svg width="26" height="26" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"></path></svg>
          </button>
          <h1 class="text-xl font-black text-blue-700 tracking-tight">MistaHub</h1>
        </div>
      </div>
      
      <div class="relative w-full">
        <input type="text" id="searchInput" oninput="handleSearch()" placeholder="Search apps, docs or posts..." class="w-full bg-gray-100 border border-gray-200 rounded-xl py-2.5 px-4 pl-11 focus:ring-2 focus:ring-blue-500 focus:bg-white outline-none transition-all shadow-inner text-sm">
        <svg class="absolute left-3.5 top-3 text-gray-400" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
      </div>
    </div>
  </header>

  <div id="drawer" class="fixed inset-y-0 left-0 w-72 bg-white shadow-2xl transform -translate-x-full transition-transform duration-300 z-50 flex flex-col">
    <div class="p-5 border-b flex justify-between items-center bg-gray-50">
      <span class="font-black text-lg text-gray-800">Apps & Docs</span>
      <button onclick="toggleDrawer()" class="text-gray-500 hover:text-red-500 p-1">
        <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"></path></svg>
      </button>
    </div>
    <nav id="drawer-menu" class="p-3 space-y-1 overflow-y-auto flex-1"></nav>
  </div>

  <div id="overlay" onclick="toggleDrawer()" class="fixed inset-0 bg-black/60 hidden z-40 backdrop-blur-sm transition-opacity"></div>

  <main class="pt-[120px] pb-10 px-4 max-w-3xl mx-auto min-h-screen">
    <div id="feed-container" class="space-y-6"></div>
    
    <div id="empty-state" class="hidden text-center py-10 text-gray-500">
      <svg class="mx-auto mb-3 text-gray-300" width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
      <p>No posts found matching your search.</p>
    </div>
  </main>

  <script>
    let postsData = [];

    // 1. Fetch JSON and Initialize
    async function loadData() {
      try {
        const response = await fetch('/routes.json');
        postsData = await response.json();
        renderFeed(postsData);
        renderDrawer(postsData);
      } catch (error) {
        document.getElementById('feed-container').innerHTML = '<p class="text-red-500 text-center py-10">Error loading data. Please check routes.json</p>';
      }
    }

    // 2. Render Main Feed Cards
    function renderFeed(data) {
      const container = document.getElementById('feed-container');
      const emptyState = document.getElementById('empty-state');
      
      if (data.length === 0) {
        container.innerHTML = '';
        emptyState.classList.remove('hidden');
        return;
      }
      
      emptyState.classList.add('hidden');
      container.innerHTML = data.map(post => `
        <div class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden hover:shadow-md transition-shadow">
          
          ${post.thumbnail ? `<img src="${post.thumbnail}" alt="${post.title}" class="w-full h-40 object-cover border-b border-gray-100">` : ''}
          
          <div class="p-4 flex items-center gap-4">
            
            <div class="w-14 h-14 rounded-xl bg-blue-50 flex items-center justify-center text-3xl flex-shrink-0 shadow-inner">
              ${post.appIcon}
            </div>
            
            <div class="flex-1 min-w-0">
              <h2 class="text-lg font-bold text-gray-900 truncate" title="${post.title}">${post.title}</h2>
              <p class="text-sm text-gray-500 line-clamp-1 mt-0.5" title="${post.description}">${post.description}</p>
            </div>
            
            <a href="${post.url}" class="flex-shrink-0 bg-gray-900 hover:bg-blue-600 text-white font-bold py-2 px-4 rounded-xl text-sm transition-colors shadow-sm">
              Open
            </a>
            
          </div>
        </div>
      `).join('');
    }

    // 3. Render Drawer Menu
    function renderDrawer(data) {
      const drawerMenu = document.getElementById('drawer-menu');
      drawerMenu.innerHTML = data.map(post => `
        <a href="${post.url}" class="flex items-center gap-3 p-3 rounded-xl hover:bg-gray-100 transition-colors text-gray-700 hover:text-blue-600">
          <span class="text-2xl">${post.appIcon}</span>
          <div class="flex-1">
            <h3 class="font-bold text-sm leading-tight">${post.title}</h3>
          </div>
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" class="text-gray-400"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"></path></svg>
        </a>
      `).join('');
    }

    // 4. Search Logic
    function handleSearch() {
      const query = document.getElementById('searchInput').value.toLowerCase();
      const filtered = postsData.filter(post => 
        post.title.toLowerCase().includes(query) || 
        post.description.toLowerCase().includes(query)
      );
      renderFeed(filtered);
    }

    // 5. Drawer Toggle Logic
    const drawer = document.getElementById('drawer');
    const overlay = document.getElementById('overlay');
    function toggleDrawer() {
      const isClosed = drawer.classList.contains('-translate-x-full');
      if (isClosed) {
        drawer.classList.remove('-translate-x-full');
        overlay.classList.remove('hidden');
        document.body.style.overflow = 'hidden'; // Stop background scroll
      } else {
        drawer.classList.add('-translate-x-full');
        overlay.classList.add('hidden');
        document.body.style.overflow = 'auto';
      }
    }

    // Start App
    loadData();
  </script>
</body>
</html>
