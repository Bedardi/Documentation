<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MistaHub Developer Docs</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Documentation for MistaHub Tools and APIs">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  
  <!-- Vue Theme (Clean & Professional) -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
</head>
<body>
  <div id="app">Loading MistaHub Docs...</div>
  
  <script>
    window.$docsify = {
      name: 'MistaHub Docs',
      repo: '', // Yahan aap apne github repo ka link daal sakte hain
      loadSidebar: true, // Sidebar menu enable karega
      subMaxLevel: 2, // Headings ko menu me dikhayega
      auto2top: true, // Page change hone par upar scroll kar dega
      
      // Search Plugin Configuration
      search: {
        maxAge: 86400000, 
        paths: 'auto',
        placeholder: '🔍 Search docs...',
        noData: 'No Results Found!',
        depth: 3
      }
    }
  </script>
  
  <!-- Docsify Core Script -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  
  <!-- Search Plugin -->
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  
  <!-- Copy to Clipboard Plugin -->
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script>
  
  <!-- Syntax Highlighting for JSON, Bash, JS -->
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
</body>
</html>
