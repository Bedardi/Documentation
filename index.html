<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MistaHub Official Docs</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  
  <!-- Humara auto-generator file load kar rahe hain -->
  <script src="/sitemap.js"></script>
  
  <style>
    /* Modern Background */
    body {
      background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }
    
    /* App Logo & Search Header */
    .app-name {
      font-weight: 900;
      font-size: 24px;
      color: #333;
    }

    /* Glassmorphism Card Style (Facebook Post Style) */
    .glass-card {
      background: rgba(255, 255, 255, 0.4);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.5);
      box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
      padding: 20px;
      margin-bottom: 20px;
      transition: transform 0.2s;
    }
    .glass-card:hover {
      transform: translateY(-5px);
    }
    
    /* Buttons */
    .card-actions {
      display: flex;
      gap: 10px;
      margin-top: 15px;
    }
    .read-btn {
      background: #007bff;
      color: white !important;
      padding: 8px 16px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
    }
    .share-btn {
      background: rgba(255,255,255,0.6);
      border: 1px solid #ccc;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div id="app">Loading MistaHub Docs...</div>
  
  <script>
    // Share Link Function (Native Mobile Share Support)
    window.shareLink = function(path) {
      const fullUrl = window.location.origin + path;
      if (navigator.share) {
        navigator.share({
          title: 'MistaHub Docs',
          text: 'Check out this documentation page!',
          url: fullUrl
        }).catch(err => console.log('Share failed:', err));
      } else {
        navigator.clipboard.writeText(fullUrl);
        alert('Link Copied to Clipboard!');
      }
    };

    window.$docsify = {
      name: 'MistaHub',
      routerMode: 'history',
      loadSidebar: true,
      hideSidebar: false,
      search: {
        placeholder: '🔍 Search docs...',
      },
      // Ye function dynamically Sidebar banayega
      plugins: [
        function(hook, vm) {
          hook.beforeEach(function(content) {
            if (vm.route.file === 'README.md') {
              // Agar user Home Page par hai, to Cards dikhao
              return '# Welcome to MistaHub\n\n' + window.autoHomeCards;
            } else if (vm.route.file === '_sidebar.md') {
              // Sidebar ko sitemap array se inject karo
              return window.autoSidebar;
            }
            return content;
          });
        }
      ]
    }
  </script>
  
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
</body>
</html>
